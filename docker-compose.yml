services:
  xteink:
    build: .
    # On the nginx-proxy-manager `proxy` bridge network so NPM can reverse-proxy
    # to it by name (xteink:8090) — e.g. for a DuckDNS domain with HTTPS. Port
    # 8090 is also published so the X4 can still sync directly to the host at
    # :8090 during the transition.
    #
    # This replaces the previous `network_mode: host`: Docker forbids combining
    # host mode with a bridge network, and the proxy network is what NPM needs.
    # Device discovery still works — crosspoint.local resolves via libnss-mdns
    # talking to the host avahi socket (mounted below), and the resulting LAN IP
    # is reachable from the bridge through the host's routing.
    networks:
      - proxy
    ports:
      - "8090:8090"
    volumes:
      - /srv/docker/data/syncthing/shares/xteink-vault:/data/vault
      - /srv/docker/data/xteink-x4-commonplace/config:/data/config
      - /srv/docker/data/xteink-x4-commonplace/state:/data/state
      # Host avahi-daemon socket — nss-mdns in the container resolves
      # crosspoint.local through the same avahi the host uses. The container
      # has no avahi of its own, so without this .local never resolves.
      - /run/avahi-daemon/socket:/run/avahi-daemon/socket
    environment:
      # At home:      DEVICE_HOST=crosspoint.local  (default; resolved via
      #               libnss-mdns + the mounted host avahi socket)
      # Via Tailscale: DEVICE_HOST=100.x.x.x  (X4's Tailscale IP)
      # Fallback if mDNS is unavailable: set DEVICE_HOST to a static IP, or
      # pin the name with extra_hosts below.
      - DEVICE_HOST=crosspoint.local
      - VAULT_PATH=/data/vault
      - STATE_DB=/data/state/state.db
      - KOREADER_DB=/data/state/koreader.db
      # Optional: set to your ntfy.sh topic URL to get push notifications
      # - NTFY_TOPIC=https://ntfy.sh/your-topic-here
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      # KOReader sync auth (kosync x-auth). Set both to require the X4 to send a
      # matching username + key (KOReader sends x-auth-key = md5(password)).
      # Leave unset for an open, LAN-only server; SET THESE when exposing the
      # server publicly via NPM/DuckDNS. On the X4: KOReader > Progress sync,
      # use the same username + password. NOT HTTP Basic Auth — do not add an
      # NPM Access List to the sync host, it would 401 the X4.
      # - KOSYNC_USER=xteink
      # - KOSYNC_PASSWORD=628080
      # Exposing ONLY the sync publicly (NPM/DuckDNS): set this to that public
      # hostname so the web UI + /api are refused on it (kept LAN/Tailscale only),
      # while the kosync endpoints stay reachable there.
      # - PUBLIC_SYNC_HOST=sync.ghostbird.duckdns.org
    # Fallback if in-container mDNS ever fails — pin the device IP here:
    # extra_hosts:
    #   - "crosspoint.local:192.168.x.x"
    restart: unless-stopped

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: xteink-jenkins:latest
    container_name: jenkins
    ports:
      # Bind to Tailscale interface only — not exposed on the public internet.
      # Replace 100.x.x.x with this machine's Tailscale IP (`tailscale ip -4`).
      # To also allow LAN access, use 0.0.0.0 and rely on your firewall (ufw).
      - "8888:8080"
      - "50000:50000"
    volumes:
      - /srv/docker/data/jenkins:/var/jenkins_home
    environment:
      - TZ=America/Toronto
    restart: unless-stopped

networks:
  # Shared with nginx-proxy-manager (created by the main homelab compose).
  proxy:
    external: true
